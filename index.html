<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub-50 Training App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#0D0D0D; --card:#161616; --card2:#1E1E1E; --border:#252525; --border2:#2E2E2E;
  --text:#F0EDE8; --muted:#888880; --faint:#444440;
  --green:#2ECC8A; --green-bg:#0D2B1C; --green-dim:#1A3D28;
  --amber:#E8A844; --amber-bg:#2A1E08; --amber-dim:#3A2A0A;
  --blue:#4A9EE8; --blue-bg:#0A1E38; --blue-dim:#0E2848;
  --coral:#E86A44; --coral-bg:#2A1208; --coral-dim:#3A1A0A;
  --purple:#9B7FE8; --purple-bg:#1A1430; --purple-dim:#221840;
  --teal:#44C8A8; --teal-bg:#082820; --teal-dim:#0E3028;
  --red:#E84444; --red-bg:#2A0808;
  --pink:#E84488; --pink-bg:#2A0818;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;}

/* ── Nav bar ── */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:14px 20px;font-size:13px;font-weight:500;font-family:inherit;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--green);}
.nav-btn:hover:not(.active){color:var(--text);}

/* ── Main scroll area ── */
.main{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.section{display:none;}
.section.active{display:block;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px;}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.card-h{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── Header band ── */
.header-band{background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:14px;}

/* ── Pills / badges ── */
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.02em;}
.pill-easy{background:var(--green-bg);border:1px solid var(--green);color:var(--green);}
.pill-long{background:var(--purple-bg);border:1px solid var(--purple);color:var(--purple);}
.pill-tempo{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);}
.pill-intv{background:var(--amber-bg);border:1px solid var(--amber);color:var(--amber);}
.pill-race{background:var(--coral-bg);border:1px solid var(--coral);color:var(--coral);}
.pill-gym{background:var(--teal-bg);border:1px solid var(--teal);color:var(--teal);}
.pill-rest{background:var(--border);border:1px solid var(--border2);color:var(--muted);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}

/* ── Checkboxes ── */
.cb-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.cb-row:last-child{border-bottom:none;}
.cb-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:1px;accent-color:var(--green);cursor:pointer;}
.cb-row label{cursor:pointer;flex:1;line-height:1.5;}
.cb-row.done label{text-decoration:line-through;color:var(--muted);}
.cb-row .cb-detail{display:block;font-size:11px;color:var(--faint);margin-top:1px;line-height:1.4;}
.cb-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:1px;}

/* ── Progress bar ── */
.pbar-wrap{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s;}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card2);border-radius:10px;padding:12px 14px;}
.stat-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

/* ── Week grid ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px;}
.day-cell{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;transition:border-color .15s;}
.day-cell:hover{border-color:var(--border2);}
.day-cell.today{border-color:var(--green);}
.day-cell.done-cell{background:var(--green-dim);}
.day-name-sm{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.day-session{font-size:11px;font-weight:500;line-height:1.3;}

/* ── Full plan table ── */
.plan-week-row{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;}
.plan-week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:8px;}
.plan-week-header:hover{background:var(--card2);}
.plan-week-body{padding:12px 14px;border-top:1px solid var(--border);display:none;}
.plan-week-body.open{display:block;}
.plan-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.plan-day{background:var(--card2);border-radius:7px;padding:8px 6px;}
.plan-day-name{font-size:9px;font-weight:600;color:var(--faint);text-transform:uppercase;margin-bottom:4px;}

/* ── Textarea ── */
textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:56px;line-height:1.5;}
textarea:focus{outline:none;border-color:var(--green);}
textarea::placeholder{color:var(--faint);}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;background:var(--card2);color:var(--text);transition:all .15s;}
.btn:hover{border-color:var(--green);color:var(--green);}
.btn-green{background:var(--green);color:#060E09;border-color:var(--green);}
.btn-green:hover{background:#3DE89C;border-color:#3DE89C;color:#060E09;}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px;}

/* ── Alert ── */
.alert{border-left:2px solid var(--red);background:var(--red-bg);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#E88888;line-height:1.6;margin-bottom:10px;}

/* ── Section heading ── */
.sec-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;margin-top:20px;}
.sec-h:first-child{margin-top:0;}

/* ── Meal card ── */
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:520px){.meal-grid{grid-template-columns:1fr;}}
.meal-card{background:var(--card2);border-radius:10px;padding:12px 14px;}
.meal-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.meal-text{font-size:13px;line-height:1.6;color:var(--text);}
.meal-macros{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.macro-chip{font-size:10px;background:var(--border);color:var(--muted);padding:2px 7px;border-radius:5px;}
.carb-swap{font-size:11px;color:var(--blue);background:var(--blue-bg);border-radius:5px;padding:4px 8px;margin-top:6px;display:inline-block;}
.whey-tag{font-size:10px;font-weight:600;background:var(--pink-bg);color:var(--pink);padding:2px 7px;border-radius:5px;margin-left:3px;}

/* ── Injury badge colours ── */
.cb-ankle{background:var(--amber-bg);color:var(--amber);}
.cb-knee{background:var(--blue-bg);color:var(--blue);}
.cb-both{background:var(--purple-bg);color:var(--purple);}

/* ── Streak dots ── */
.streak-dots{display:flex;gap:4px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border2);}
.dot.filled{background:var(--green);}

/* ── Weight chart ── */
.weight-entries{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.weight-entry{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--card2);border-radius:7px;font-size:13px;}
.weight-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 4px;}
.weight-del:hover{color:var(--red);}

/* ── Race countdown ── */
.race-banner{background:linear-gradient(135deg,var(--coral-bg),var(--amber-bg));border:1px solid var(--coral);border-radius:14px;padding:20px;margin-bottom:14px;text-align:center;}

/* ── Phase indicator ── */
.phase-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}

/* ── Responsive ── */
@media(max-width:600px){
  .week-grid{grid-template-columns:repeat(7,1fr);gap:3px;}
  .day-cell{padding:7px 4px;}
  .main{padding:12px;}
  .meal-grid{grid-template-columns:1fr;}
}
</style>
</head>

// STORAGE (localStorage fallback)

let DB = {};

async function dbLoad(key) {
  try {
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : null;
  } catch {
    return JSON.parse(localStorage.getItem('app_'+key) || 'null');
  }
}
async function dbSave(key, val) {
  const s = JSON.stringify(val);
  try { await window.storage.set(key, s); } catch {}
  try { localStorage.setItem('app_'+key, s); } catch {}
}

async function initDB() {
  DB.sessions  = await dbLoad('sessions')  || {};
  DB.notes     = await dbLoad('notes')     || {};
  DB.injury    = await dbLoad('injury')    || {};
  DB.diet      = await dbLoad('diet')      || {};
  DB.weights   = await dbLoad('weights')   || [];
  DB.dietNotes = await dbLoad('dietNotes') || {};
}

async function saveField(field) { await dbSave(field, DB[field]); }

// HELPERS
// ═══════════════════════════════════════════════════════════════
function today() {
  const now = new Date();
  const ms = now - PLAN_START;
  const days = Math.floor(ms / 86400000);
  const wi = Math.min(Math.max(0, Math.floor(days / 7)), 23);
  const jsDay = now.getDay(); // 0=Sun
  const planDay = jsDay === 0 ? 6 : jsDay - 1; // 0=Mon
  const dtr = Math.max(0, Math.round((RACE_DATE - now) / 86400000));
  const pct = Math.min(100, Math.max(0, days / 168 * 100));
  return { wi, planDay, dtr, pct, jsDay, days };
}

function sessionPill(t, gym, big) {
  const map = {
    easy: ['pill-easy','Easy run'],
    long: ['pill-long','Long run'],
    tempo:['pill-tempo','Tempo'],
    intv: ['pill-intv','Intervals'],
    race: ['pill-race','Race'],
    gym:  ['pill-gym', gym||'Gym'],
    rest: ['pill-rest','Rest'],
  };
  const [cls, lbl] = map[t]||map.rest;
  return `<span class="pill ${cls}" style="${big?'font-size:13px;padding:5px 12px':''}">${lbl}</span>`;
}

function phaseColor(wk) {
  const p = getPhase(wk);
  return p ? p.color : '#44C8A8';
}
function getPhase(wk) {
  return PHASES.find(p => wk >= p.weeks[0] && wk <= p.weeks[1]) || PHASES[0];
}

function todayKey(wi, di) { return `w${wi}_d${di}`; }
function dateKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const SECTIONS = ['today','week','plan','diet','injury','progress'];
function nav(id) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', SECTIONS[i]===id));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  renders[id]();
}

    </div>
  </div>

  <div class="week-grid">
    ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i) => {
      const s = week.days[i];
      const sKey = `w${wi}_d${i}`;
      // We use a day-specific key for current week's completions
      // Find actual calendar date for this day
      const dayDate = new Date(weekStart);

        <div style="margin-bottom:5px">${sessionPill(s.t,s.gym)}</div>

// RENDER — FULL PLAN
// ═══════════════════════════════════════════════════════════════
function renderPlan() {
  const { wi } = today();
  let html = `<div style="font-size:22px;font-weight:700;letter-spacing:-0.01em;margin-bottom:14px">All 24 weeks</div>`;

  PHASES.forEach(ph => {
    const phWeeks = WEEKS.filter(w => getPhase(w.wk).id === ph.id);
    html += `<div style="margin-bottom:6px;padding:10px 14px;background:${ph.dim};border:1px solid ${ph.color}33;border-radius:10px;font-size:13px;font-weight:600;color:${ph.color}">
      Phase ${ph.id} — ${ph.name}
    </div>`;
    phWeeks.forEach(week => {
      const wIdx = week.wk - 1;
      const isCurrent = wIdx === wi;
      const completedCount = week.days.filter((d,i) => {
        const weekStart = new Date(PLAN_START);
        weekStart.setDate(weekStart.getDate() + wIdx * 7);
        const dayDate = new Date(weekStart);
        dayDate.setDate(dayDate.getDate() + i);
        const dk = `${dayDate.getFullYear()}-${String(dayDate.getMonth()+1).padStart(2,'0')}-${String(dayDate.getDate()).padStart(2,'0')}`;
        return DB.sessions[dk+'_s'];
      }).length;
      const nonRest = week.days.filter(d=>d.t!=='rest').length;

      html += `<div class="plan-week-row" style="${isCurrent?'border-color:var(--green)':''}">
        <div class="plan-week-header" onclick="togglePlanWeek(${wIdx})">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${isCurrent?`<span style="font-size:10px;font-weight:600;color:var(--green);background:var(--green-bg);padding:2px 7px;border-radius:5px">CURRENT</span>`:''}
            ${week.rec?`<span style="font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-bg);padding:2px 7px;border-radius:5px">RECOVERY</span>`:''}
            <span style="font-size:13px;font-weight:600">${week.wk <= 6 ? 'Week' : 'Week'} ${week.wk}</span>
            <span style="font-size:12px;color:var(--muted)">${week.dates}</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:12px;color:var(--muted)">${week.vol}</span>
            <span style="font-size:12px;color:${completedCount>0?'var(--green)':'var(--faint)'}">${completedCount}/${nonRest}</span>
            <span style="color:var(--faint);font-size:16px" id="arr_${wIdx}">›</span>
          </div>
        </div>
        <div class="plan-week-body" id="pwb_${wIdx}">
          <div class="plan-days-grid">
            ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>{
              const s = week.days[i];
              const weekStart = new Date(PLAN_START);
              weekStart.setDate(weekStart.getDate() + wIdx * 7);
              const dayDate = new Date(weekStart);
              dayDate.setDate(dayDate.getDate() + i);
              const dk = `${dayDate.getFullYear()}-${String(dayDate.getMonth()+1).padStart(2,'0')}-${String(dayDate.getDate()).padStart(2,'0')}`;
              const done = DB.sessions[dk+'_s']||false;
              return `<div class="plan-day" style="${done?'background:var(--green-dim)':''}">
                <div class="plan-day-name">${d}</div>
                ${sessionPill(s.t,s.gym)}
                <div style="font-size:10px;color:var(--faint);margin-top:4px;line-height:1.3">${s.d||''}</div>
                ${s.t!=='rest'?`<div style="display:flex;align-items:center;gap:4px;margin-top:6px">
                  <input type="checkbox" ${done?'checked':''} style="width:13px;height:13px;accent-color:var(--green);cursor:pointer" onchange="toggleSessionByDate('${dk}',this.checked)">
                  <span style="font-size:10px;color:var(--faint)">Done</span>
                </div>`:''}
              </div>`;
            }).join('')}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Week notes</div>
          <textarea style="min-height:48px" placeholder="Notes for this week..." oninput="saveNote('wk${wIdx}',this.value)">${DB.notes['wk'+wIdx]||''}</textarea>
        </div>
      </div>`;
    });
  });

  document.getElementById('sec-plan').innerHTML = html;

  // Auto-open current week
  const body = document.getElementById('pwb_'+wi);
  if (body) { body.classList.add('open'); document.getElementById('arr_'+wi).textContent='⌄'; }
}

function togglePlanWeek(i) {
  const body = document.getElementById('pwb_'+i);
  const arr  = document.getElementById('arr_'+i);
  if (!body) return;
  const open = body.classList.toggle('open');
  arr.textContent = open ? '⌄' : '›';
}

// ═══════════════════════════════════════════════════════════════
// RENDER — INJURY
// ═══════════════════════════════════════════════════════════════
function renderInjury() {
  const dk = dateKey();

  // Calculate streaks for daily routine
  let dailyStreak = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const allDone = INJURY_GROUPS.daily.items.every(item => DB.injury[`${k}_${item.id}`]);
    if (allDone) dailyStreak++;
    else if (i > 0) break;
  }

  let html = `<div style="font-size:22px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px">Injury prevention</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Left ankle (lateral sprain ~8 wks) · Right knee (medial pain)</div>

  <div class="alert" style="margin-bottom:14px">A single physio session is strongly recommended — ankle is only ~8 weeks post-sprain. A physio can confirm ligament grade and screen hip mechanics for the knee. This plan is for maintenance, not a substitute for assessment.</div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${dailyStreak}</div><div class="stat-label">Daily streak</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${countInjuryToday(dk)}</div><div class="stat-label">Done today</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${countTotalInjury()}</div><div class="stat-label">Total logged</div></div>
  </div>`;

  Object.entries(INJURY_GROUPS).forEach(([gid, g]) => {
    const done = g.items.filter(i => DB.injury[`${dk}_${i.id}`]).length;
    html += `<div class="sec-h">${g.label}</div>
    <div class="card-sm" style="border-color:${g.color}33">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:12px;color:var(--muted)">${g.sub}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;font-weight:700;color:${done===g.items.length?'var(--green)':'var(--amber)'}">${done}/${g.items.length}</span>
          <button class="btn btn-sm" onclick="resetInjuryGroup('${dk}','${gid}')">Reset</button>
        </div>
      </div>
      ${g.items.map(item => {
        const checked = DB.injury[`${dk}_${item.id}`]||false;
        const badgeCls = {ankle:'cb-ankle',knee:'cb-knee',both:'cb-both'}[item.badge]||'';
        return `<div class="cb-row${checked?' done':''}" id="inj_${dk}_${item.id}">
          <input type="checkbox" id="injcb_${dk}_${item.id}" ${checked?'checked':''} onchange="toggleInjury('${dk}','${item.id}','${gid}',this.checked)">
          <label for="injcb_${dk}_${item.id}">${item.label}<span class="cb-detail">${item.detail}</span></label>
          <span class="cb-badge ${badgeCls}">${item.badge}</span>
        </div>`;
      }).join('')}
    </div>`;
  });

  html += `
  <div class="sec-h">Balance progression — current stage</div>
  <div class="card-sm">
    ${[
      {wk:'1–2',desc:'Eyes open, flat surface — 30 sec × 3'},
      {wk:'3–4',desc:'Eyes closed, flat surface — 20 sec × 3'},
      {wk:'5–6',desc:'Eyes open, folded towel under foot — 30 sec × 3'},
      {wk:'7–9',desc:'Eyes open, small ball under foot — 30 sec × 3'},
      {wk:'10+',desc:'Single-leg mini squat on unstable surface — 3×10'},
    ].map((s,i)=>{
      const {wi}=today();
      const isCurrent = (i===0&&wi<2)||(i===1&&wi>=2&&wi<4)||(i===2&&wi>=4&&wi<6)||(i===3&&wi>=6&&wi<9)||(i===4&&wi>=9);
      return `<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:center">
        <span style="font-size:11px;font-weight:600;color:${isCurrent?'var(--green)':'var(--faint)'};min-width:36px">Wk ${s.wk}</span>
        <span style="font-size:13px;color:${isCurrent?'var(--text)':'var(--muted)'}">${s.desc}</span>
        ${isCurrent?'<span style="font-size:10px;font-weight:600;color:var(--green);background:var(--green-bg);padding:2px 7px;border-radius:5px;margin-left:auto">NOW</span>':''}
      </div>`;
    }).join('')}
  </div>

  <div class="sec-h">Warning signs — stop immediately if</div>
  <div class="alert"><strong>Ankle:</strong> Sharp pain during weight-bearing · Increasing swelling · Ankle giving way during walking · Worse morning after run two weeks running</div>
  <div class="alert"><strong>Knee:</strong> Medial pain starting during a run · Pain above 4/10 · Swelling around medial joint line · Locking or clicking · Worsening week on week</div>
  <div style="background:var(--card2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:10px">
    <strong style="color:var(--text)">The 2/10 rule:</strong> Pain up to 2/10 that doesn't increase during a session and returns to baseline within 24h is generally fine to train through. Above 3/10, or lasting more than 24h = reduce load.
  </div>
  <textarea placeholder="Injury notes — ankle stiffness, knee soreness, any concerns..." oninput="saveNote('injury_notes',this.value)">${DB.notes['injury_notes']||''}</textarea>
  `;

  document.getElementById('sec-injury').innerHTML = html;
}

function countInjuryToday(dk) {
  return Object.keys(INJURY_GROUPS).reduce((sum,gid) =>
    sum + INJURY_GROUPS[gid].items.filter(i => DB.injury[`${dk}_${i.id}`]).length, 0);
}
function countTotalInjury() {
  return Object.keys(DB.injury).filter(k => DB.injury[k]).length;
}

// RENDER — PROGRESS
// ═══════════════════════════════════════════════════════════════
function renderProgress() {
  const { wi, dtr, pct } = today();

  // Count completed sessions
  let totalSessions = 0, completedSessions = 0;
  WEEKS.forEach((week, wIdx) => {
    week.days.forEach((d, dIdx) => {
      if (d.t !== 'rest') {
        totalSessions++;
        const weekStart = new Date(PLAN_START);
        weekStart.setDate(weekStart.getDate() + wIdx * 7);
        const dayDate = new Date(weekStart);
        dayDate.setDate(dayDate.getDate() + dIdx);
        const dk = `${dayDate.getFullYear()}-${String(dayDate.getMonth()+1).padStart(2,'0')}-${String(dayDate.getDate()).padStart(2,'0')}`;
        if (DB.sessions[dk+'_s']) completedSessions++;
      }
    });
  });

  // Latest weight
  const latestWeight = DB.weights.length > 0 ? DB.weights[DB.weights.length-1].val : '—';
  const startWeight = 147;
  const goalWeight = 130;
  const weightLost = DB.weights.length > 0 ? (startWeight - parseFloat(DB.weights[DB.weights.length-1].val)).toFixed(1) : '0';
  const weightPct = DB.weights.length > 0 ? Math.min(100, Math.max(0, (startWeight - parseFloat(DB.weights[DB.weights.length-1].val)) / (startWeight - goalWeight) * 100)) : 0;

  let html = `<div style="font-size:22px;font-weight:700;letter-spacing:-0.01em;margin-bottom:16px">Progress</div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${completedSessions}</div><div class="stat-label">Sessions done</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${wi+1}</div><div class="stat-label">Current week</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${dtr}</div><div class="stat-label">Days to race</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--coral)">${latestWeight}</div><div class="stat-label">Last weight (lb)</div></div>
  </div>

  <div class="sec-h">Plan progress</div>
  <div class="card-sm">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
      <span>Training plan</span><span>${pct.toFixed(0)}% complete</span>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct.toFixed(1)}%;background:var(--green)"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--faint)">
      <span>23 Mar</span><span>6 Sep</span>
    </div>
  </div>
  <div class="card-sm" style="margin-top:8px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
      <span>Sessions completed</span><span>${completedSessions} / ${totalSessions}</span>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" style="width:${totalSessions>0?(completedSessions/totalSessions*100).toFixed(1):0}%;background:var(--teal)"></div></div>
  </div>

  <div class="sec-h">Weight progress</div>
  <div class="card-sm" style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
      <span>147 lb → 130 lb goal</span><span>${weightLost > 0 ? weightLost + ' lb lost' : 'Start logging'}</span>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" style="width:${weightPct.toFixed(1)}%;background:var(--amber)"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--faint)">
      <span>147 lb</span><span>Goal: 130 lb (~mid Jul)</span>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <input id="wt-val2" type="number" step="0.1" placeholder="Weight in lbs" style="flex:1;min-width:120px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:14px;">
    <button class="btn btn-green" onclick="logWeight2()">Log weight</button>
  </div>

  <div class="weight-entries" style="max-height:250px">
    ${DB.weights.length === 0 ? '<div style="color:var(--faint);font-size:13px;padding:8px 0">No weight entries yet — log your first one above</div>' :
    [...DB.weights].reverse().map(e => `
    <div class="weight-entry">
      <span style="color:var(--muted);font-size:12px">${e.date}</span>
      <span style="font-size:16px;font-weight:600">${e.val} lb</span>
      <span style="font-size:12px;font-weight:500;color:${parseFloat(e.val)<=130?'var(--green)':parseFloat(e.val)<=137?'var(--amber)':'var(--coral)'}">${parseFloat(e.val)<=130?'Goal!':'→ '+(parseFloat(e.val)-130).toFixed(1)+' to go'}</span>
      <button class="weight-del" onclick="deleteWeight('${e.id}')">×</button>
    </div>`).join('')}
  </div>

  <div class="sec-h">Pace targets</div>
  <div class="card-sm">
    ${[
      ['Easy / recovery','9:40–10:30 /mi'],
      ['Long run','9:15–10:00 /mi'],
      ['Tempo (threshold)','8:20–8:35 /mi'],
      ['Intervals','7:40–7:55 /mi'],
      ['Race target','8:03 /mi'],
      ['Current fitness','~8:51 /mi (54:58 on 15 Mar)'],
    ].map(([label,val])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--muted)">${label}</span>
      <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:${label==='Race target'?'var(--coral)':label==='Current fitness'?'var(--amber)':'var(--text)'}">${val}</span>
    </div>`).join('')}
  </div>

  <div class="sec-h">Race day strategy</div>
  <div class="card-sm" style="background:var(--coral-bg);border-color:var(--coral)33">
    ${[
      ['Warm up','—','10–12 min easy jog + 4×100m strides'],
      ['Mile 1','8:10','Will feel easy. Resist going faster. That\'s correct.'],
      ['Miles 2–5','8:03','Settle in and hold. Controlled.'],
      ['Mile 6','all out','Empty the tank. You\'ve done the work.'],
    ].map(([l,p,n])=>`
    <div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--coral)22;align-items:baseline">
      <span style="font-size:12px;font-weight:600;color:var(--coral);min-width:55px">${l}</span>
      <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--coral);min-width:55px">${p}</span>
      <span style="font-size:12px;color:#C05030;opacity:.9">${n}</span>
    </div>`).join('')}
  </div>
  `;

  document.getElementById('sec-progress').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function toggleSession(key) {
  DB.sessions[key] = !DB.sessions[key];
  saveField('sessions');
  renders.today();
}
function toggleSessionByDate(dk, checked) {
  DB.sessions[dk+'_s'] = checked;
  saveField('sessions');
}
function toggleInjury(dk, itemId, gid, checked) {
  DB.injury[`${dk}_${itemId}`] = checked;
  saveField('injury');
  // Update row styling
  const row = document.getElementById(`cbrow_${dk}_${itemId}`) || document.getElementById(`inj_${dk}_${itemId}`);
  if (row) row.classList.toggle('done', checked);
  // Update counts
  const g = INJURY_GROUPS[gid];
  if (!g) return;
  const done = g.items.filter(i => DB.injury[`${dk}_${i.id}`]).length;
  // find count elements
  document.querySelectorAll(`[data-count="${gid}"]`).forEach(el => {
    el.textContent = `${done}/${g.items.length}`;
    el.style.color = done === g.items.length ? 'var(--green)' : 'var(--amber)';
  });
}
function resetInjuryGroup(dk, gid) {
  INJURY_GROUPS[gid].items.forEach(i => { DB.injury[`${dk}_${i.id}`] = false; });
  saveField('injury');
  renders.injury();
}
function toggleDietSnack(dk, snackId, checked) {
  const k = dk+'_diet_'+snackId;
  DB.diet[k] = checked;
  saveField('diet');
  const row = document.getElementById(`cbrow_diet_${dk}_${snackId}`);
  if (row) row.classList.toggle('done', checked);
}
function toggleDietSnackDOW(dayIdx, snackId, checked) {
  const k = `diet_dow_${dayIdx}_${snackId}`;
  DB.diet[k] = checked;
  saveField('diet');
  const row = document.getElementById(`cbrow_diet_dow_${dayIdx}_${snackId}`);
  if (row) row.classList.toggle('done', checked);
}
function saveSessionNote(dk, val) {
  DB.notes['sn_'+dk] = val;
  saveField('notes');
}
function saveNote(key, val) {
  DB.notes[key] = val;
  saveField('notes');
}
function saveDietNote(dk, val) {
  DB.dietNotes[dk] = val;
  saveField('dietNotes');
}
function saveDietWeekdayNote(idx, val) {
  DB.dietNotes['dow_'+idx] = val;
  saveField('dietNotes');
}
function logWeight() {
  const inp = document.getElementById('wt-val');
  const val = parseFloat(inp.value);
  if (!val || val < 80 || val > 300) return;
  DB.weights.push({ id: Date.now()+'', date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}), val });
  saveField('weights');
  inp.value = '';
  renders.week();
}
function logWeight2() {
  const inp = document.getElementById('wt-val2');
  const val = parseFloat(inp.value);
  if (!val || val < 80 || val > 300) return;
  DB.weights.push({ id: Date.now()+'', date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}), val });
  saveField('weights');
  inp.value = '';
  renders.progress();
}
function deleteWeight(id) {
  DB.weights = DB.weights.filter(w => w.id !== id);
  saveField('weights');
  // Re-render whichever section is visible
  const activeId = document.querySelector('.section.active')?.id?.replace('sec-','');
  if (activeId && renders[activeId]) renders[activeId]();
}
function openDayDetail(i) {
  // Navigate to plan and show week detail
  nav('plan');
}

// ═══════════════════════════════════════════════════════════════
// RENDER MAP
// ═══════════════════════════════════════════════════════════════
const renders = {
  today:    renderToday,
  week:     renderWeek,
  plan:     renderPlan,
  diet:     renderDiet,
  injury:   renderInjury,
  progress: renderProgress,
};

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initDB().then(() => {
  renders.today();
});
</script>
</body>
</html>
