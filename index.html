<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub-50 Training App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
 
:root {
  --bg:#0D0D0D; --card:#161616; --card2:#1E1E1E; --border:#252525; --border2:#2E2E2E;
  --text:#F0EDE8; --muted:#888880; --faint:#444440;
  --green:#2ECC8A; --green-bg:#0D2B1C; --green-dim:#1A3D28;
  --amber:#E8A844; --amber-bg:#2A1E08; --amber-dim:#3A2A0A;
  --blue:#4A9EE8; --blue-bg:#0A1E38; --blue-dim:#0E2848;
  --coral:#E86A44; --coral-bg:#2A1208; --coral-dim:#3A1A0A;
  --purple:#9B7FE8; --purple-bg:#1A1430; --purple-dim:#221840;
  --teal:#44C8A8; --teal-bg:#082820; --teal-dim:#0E3028;
  --red:#E84444; --red-bg:#2A0808;
  --pink:#E84488; --pink-bg:#2A0818;
}
 
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;}
 
/* ── Nav bar ── */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:14px 20px;font-size:13px;font-weight:500;font-family:inherit;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--green);}
.nav-btn:hover:not(.active){color:var(--text);}
 
/* ── Main scroll area ── */
.main{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.section{display:none;}
.section.active{display:block;}
 
/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px;}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.card-h{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;}
 
/* ── Header band ── */
.header-band{background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:14px;}
 
/* ── Pills / badges ── */
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.02em;}
.pill-easy{background:var(--green-bg);border:1px solid var(--green);color:var(--green);}
.pill-long{background:var(--purple-bg);border:1px solid var(--purple);color:var(--purple);}
.pill-tempo{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);}
.pill-intv{background:var(--amber-bg);border:1px solid var(--amber);color:var(--amber);}
.pill-race{background:var(--coral-bg);border:1px solid var(--coral);color:var(--coral);}
.pill-gym{background:var(--teal-bg);border:1px solid var(--teal);color:var(--teal);}
.pill-rest{background:var(--border);border:1px solid var(--border2);color:var(--muted);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}
 
/* ── Checkboxes ── */
.cb-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.cb-row:last-child{border-bottom:none;}
.cb-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:1px;accent-color:var(--green);cursor:pointer;}
.cb-row label{cursor:pointer;flex:1;line-height:1.5;}
.cb-row.done label{text-decoration:line-through;color:var(--muted);}
.cb-row .cb-detail{display:block;font-size:11px;color:var(--faint);margin-top:1px;line-height:1.4;}
.cb-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
 
/* ── Inline checklist (no border rows) ── */
.check-list{list-style:none;padding:0;margin:0;}
.check-list li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;line-height:1.5;color:var(--text);}
.check-list li::before{content:'·';color:var(--green);font-size:18px;line-height:1.1;flex-shrink:0;}
 
/* ── Traffic light system ── */
.light-block{border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.light-green{background:var(--green-bg);border:1px solid var(--green)33;}
.light-amber{background:var(--amber-bg);border:1px solid var(--amber)33;}
.light-red{background:var(--red-bg);border:1px solid var(--red)33;}
.light-label{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}
.light-label-green{color:var(--green);}
.light-label-amber{color:var(--amber);}
.light-label-red{color:#E88888;}
 
/* ── Progress bar ── */
.pbar-wrap{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s;}
 
/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card2);border-radius:10px;padding:12px 14px;}
.stat-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
 
/* ── Week grid ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px;}
.day-cell{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;transition:border-color .15s;}
.day-cell:hover{border-color:var(--border2);}
.day-cell.today{border-color:var(--green);}
.day-cell.done-cell{background:var(--green-dim);}
.day-name-sm{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.day-session{font-size:11px;font-weight:500;line-height:1.3;}
 
/* ── Full plan table ── */
.plan-week-row{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;}
.plan-week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:8px;}
.plan-week-header:hover{background:var(--card2);}
.plan-week-body{padding:12px 14px;border-top:1px solid var(--border);display:none;}
.plan-week-body.open{display:block;}
.plan-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.plan-day{background:var(--card2);border-radius:7px;padding:8px 6px;}
.plan-day-name{font-size:9px;font-weight:600;color:var(--faint);text-transform:uppercase;margin-bottom:4px;}
 
/* ── Textarea ── */
textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:56px;line-height:1.5;}
textarea:focus{outline:none;border-color:var(--green);}
textarea::placeholder{color:var(--faint);}
 
/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;background:var(--card2);color:var(--text);transition:all .15s;}
.btn:hover{border-color:var(--green);color:var(--green);}
.btn-green{background:var(--green);color:#060E09;border-color:var(--green);}
.btn-green:hover{background:#3DE89C;border-color:#3DE89C;color:#060E09;}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px;}
 
/* ── Alert ── */
.alert{border-left:2px solid var(--red);background:var(--red-bg);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#E88888;line-height:1.6;margin-bottom:10px;}
 
/* ── Section heading ── */
.sec-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;margin-top:20px;}
.sec-h:first-child{margin-top:0;}
 
/* ── Intro banner ── */
.intro-banner{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--muted);line-height:1.7;font-style:italic;}
.intro-banner strong{color:var(--text);font-style:normal;}
 
/* ── Meal card ── */
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:520px){.meal-grid{grid-template-columns:1fr;}}
.meal-card{background:var(--card2);border-radius:10px;padding:12px 14px;}
.meal-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.meal-text{font-size:13px;line-height:1.6;color:var(--text);}
.meal-macros{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.macro-chip{font-size:10px;background:var(--border);color:var(--muted);padding:2px 7px;border-radius:5px;}
.carb-swap{font-size:11px;color:var(--blue);background:var(--blue-bg);border-radius:5px;padding:4px 8px;margin-top:6px;display:inline-block;}
.whey-tag{font-size:10px;font-weight:600;background:var(--pink-bg);color:var(--pink);padding:2px 7px;border-radius:5px;margin-left:3px;}
 
/* ── Injury badge colours ── */
.cb-ankle{background:var(--amber-bg);color:var(--amber);}
.cb-knee{background:var(--blue-bg);color:var(--blue);}
.cb-both{background:var(--purple-bg);color:var(--purple);}
 
/* ── Streak dots ── */
.streak-dots{display:flex;gap:4px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border2);}
.dot.filled{background:var(--green);}
 
/* ── Weight chart ── */
.weight-entries{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.weight-entry{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--card2);border-radius:7px;font-size:13px;}
.weight-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 4px;}
.weight-del:hover{color:var(--red);}
 
/* ── Race countdown ── */
.race-banner{background:linear-gradient(135deg,var(--coral-bg),var(--amber-bg));border:1px solid var(--coral);border-radius:14px;padding:20px;margin-bottom:14px;text-align:center;}
 
/* ── Phase indicator ── */
.phase-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
 
/* ── Info row ── */
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-row-label{font-size:12px;color:var(--muted);flex-shrink:0;min-width:90px;}
.info-row-val{font-size:13px;color:var(--text);text-align:right;line-height:1.5;}
 
/* ── Override / skipped indicator ── */
.day-cell.overridden{border-color:var(--amber);}
.day-cell.skipped-cell{opacity:.5;}
.override-tag{font-size:9px;font-weight:700;color:var(--amber);letter-spacing:.04em;text-transform:uppercase;margin-top:3px;}
.deferred-tag{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.04em;text-transform:uppercase;margin-top:3px;}
.skipped-tag{font-size:9px;font-weight:700;color:var(--faint);letter-spacing:.04em;text-transform:uppercase;margin-top:3px;}
 
/* ── Modal overlay ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:var(--card);border-radius:18px 18px 0 0;padding:24px 20px 36px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.modal-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;margin-top:16px;}
.modal-section:first-of-type{margin-top:0;}
.session-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.session-type-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);font-family:inherit;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;}
.session-type-btn:hover,.session-type-btn.selected{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
.modal-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.modal-actions .btn{flex:1;}
.persist-toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:4px;}
.persist-toggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--amber);flex-shrink:0;}
.persist-toggle label{font-size:13px;cursor:pointer;line-height:1.4;}
 
/* ── Responsive ── */
@media(max-width:600px){
  .week-grid{grid-template-columns:repeat(7,1fr);gap:3px;}
  .day-cell{padding:7px 4px;}
  .main{padding:12px;}
  .meal-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
 
<nav class="nav" id="nav">
  <button class="nav-btn active" onclick="nav('today')">Today</button>
  <button class="nav-btn" onclick="nav('week')">This week</button>
  <button class="nav-btn" onclick="nav('plan')">Full plan</button>
  <button class="nav-btn" onclick="nav('diet')">Diet</button>
  <button class="nav-btn" onclick="nav('injury')">Injury</button>
  <button class="nav-btn" onclick="nav('progress')">Progress</button>
</nav>
 
<div class="main">
 
<!-- ════════════════ TODAY ════════════════ -->
<div class="section active" id="sec-today"></div>
 
<!-- ════════════════ THIS WEEK ════════════════ -->
<div class="section" id="sec-week"></div>
 
<!-- ════════════════ FULL PLAN ════════════════ -->
<div class="section" id="sec-plan"></div>
 
<!-- ════════════════ DIET ════════════════ -->
<div class="section" id="sec-diet"></div>
 
<!-- ════════════════ INJURY ════════════════ -->
<div class="section" id="sec-injury"></div>
 
<!-- ════════════════ PROGRESS ════════════════ -->
<div class="section" id="sec-progress"></div>
 
</div>
 
<!-- ════════════════ SESSION OVERRIDE MODAL ════════════════ -->
<div class="modal-overlay hidden" id="override-modal" onclick="closeOverrideModal(event)">
  <div class="modal-sheet" id="override-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="om-title">Adjust session</div>
    <div class="modal-sub" id="om-sub">Choose what to do with this session</div>
 
    <div class="modal-section">Change session type to</div>
    <div class="session-type-grid" id="om-type-grid">
      <button class="session-type-btn" onclick="selectOverrideType('easy')">Easy run</button>
      <button class="session-type-btn" onclick="selectOverrideType('tempo')">Tempo</button>
      <button class="session-type-btn" onclick="selectOverrideType('intv')">Intervals</button>
      <button class="session-type-btn" onclick="selectOverrideType('long')">Long run</button>
      <button class="session-type-btn" onclick="selectOverrideType('gym')">Gym</button>
      <button class="session-type-btn" onclick="selectOverrideType('rest')">Rest / off</button>
    </div>
 
    <div class="modal-section" style="margin-top:14px">Or mark as</div>
    <div style="display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap">
      <button class="session-type-btn" onclick="selectOverrideType('skipped')" style="flex:1">Skipped</button>
      <button class="session-type-btn" onclick="selectOverrideType('deferred')" style="flex:1">Deferred</button>
    </div>
 
    <div class="modal-section" style="margin-top:14px">Swap with another day this week?</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px" id="om-swap-grid"></div>
    <div style="font-size:11px;color:var(--faint);margin-bottom:4px" id="om-swap-hint">Tap a day to swap sessions with it</div>
 
    <div class="modal-section" style="margin-top:14px">How long should this last?</div>
    <div class="persist-toggle" onclick="document.getElementById('om-persist').click()">
      <input type="checkbox" id="om-persist">
      <label for="om-persist"><strong>Save until I undo it</strong> — otherwise resets at midnight</label>
    </div>
 
    <div id="om-existing-override" style="display:none;margin-top:12px">
      <div style="font-size:12px;color:var(--amber);background:var(--amber-bg);border-radius:8px;padding:10px 12px;margin-bottom:8px" id="om-existing-text"></div>
      <button class="btn btn-sm" onclick="clearOverride()" style="color:var(--coral);border-color:var(--coral)33;width:100%">Remove override — restore original session</button>
    </div>
 
    <div class="modal-actions">
      <button class="btn" onclick="closeOverrideModal()">Cancel</button>
      <button class="btn btn-green" onclick="applyOverride()" id="om-apply-btn">Apply change</button>
    </div>
  </div>
</div>
 
<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const PLAN_START = new Date('2026-03-23');
const RACE_DATE  = new Date('2026-09-06');
const DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const CTX        = ['WFH 9–5:30','Office/gym 7:30pm','WFH (free am)','Office/gym 7:30pm','WFH 9–5:30','Free','Rest day'];
 
const PHASES = [
  {id:1,name:'Base',color:'#44C8A8',dim:'#0A2820',weeks:[1,6]},
  {id:2,name:'Build',color:'#4A9EE8',dim:'#0A1E38',weeks:[7,13]},
  {id:3,name:'Peak',color:'#E8A844',dim:'#2A1E08',weeks:[14,20]},
  {id:4,name:'Taper',color:'#E86A44',dim:'#2A1208',weeks:[21,24]},
];
 
function getPhase(wk){return PHASES.find(p=>wk>=p.weeks[0]&&wk<=p.weeks[1])||PHASES[0];}
 
// [Mon,Tue,Wed,Thu,Fri,Sat,Sun] for each week
const WEEKS=[
  {wk:1,dates:'23–29 Mar',vol:'~14mi',rec:false,days:[
    {t:'easy',d:'2.5mi easy — ankle check'},
    {t:'gym',gym:'Squat or bench',d:'7:30pm'},
    {t:'gym',gym:'Hinge',d:'Morning'},
    {t:'gym',gym:'Bench or squat',d:'7:30pm'},
    {t:'easy',d:'3mi easy'},
    {t:'long',d:'5mi easy'},
    {t:'rest',d:''}]},
  {wk:2,dates:'30 Mar–5 Apr',vol:'~16mi',rec:false,days:[
    {t:'easy',d:'3mi easy'},
    {t:'gym',gym:'Squat or bench',d:'7:30pm'},
    {t:'gym',gym:'Hinge',d:'Morning'},
    {t:'gym',gym:'Bench or squat',d:'7:30pm'},
    {t:'easy',d:'3.5mi easy'},
    {t:'long',d:'6mi easy'},
    {t:'rest',d:''}]},
  {wk:3,dates:'6–12 Apr',vol:'~17mi',rec:false,days:[
    {t:'easy',d:'3mi + 4×100m strides'},
    {t:'gym',gym:'Squat or bench',d:'7:30pm'},
    {t:'gym',gym:'Hinge',d:'Morning'},
    {t:'gym',gym:'Bench or squat',d:'7:30pm'},
    {t:'easy',d:'3.5mi easy'},
    {t:'long',d:'7mi easy'},
    {t:'rest',d:''}]},
  {wk:4,dates:'13–19 Apr',vol:'~13mi',rec:true,days:[
    {t:'easy',d:'2.5mi easy'},
    {t:'gym',gym:'Squat or bench',d:'7:30pm'},
    {t:'gym',gym:'Hinge',d:'Morning'},
    {t:'gym',gym:'Bench or squat',d:'7:30pm'},
    {t:'easy',d:'3mi easy'},
    {t:'long',d:'5.5mi easy'},
    {t:'rest',d:''}]},
  {wk:5,dates:'20–26 Apr',vol:'~19mi',rec:false,days:[
    {t:'easy',d:'3.5mi easy'},
    {t:'gym',gym:'Squat or bench',d:'7:30pm'},
    {t:'gym',gym:'Hinge',d:'Morning'},
    {t:'gym',gym:'Bench or squat',d:'7:30pm'},
    {t:'tempo',d:'4.5mi: 1.5 WU, 2mi @ 8:35, 1 CD'},
    {t:'long',d:'8mi easy'},
    {t:'rest',d:''}]},
  {wk:6,dates:'27 Apr–3 May',vol:'~15mi',rec:true,days:[
    {t:'easy',d:'3mi easy'},
    {t:'gym',gym:'Squat or bench',d:'7:30pm'},
    {t:'gym',gym:'Hinge',d:'Morning'},
    {t:'gym',gym:'Bench or squat',d:'7:30pm'},
    {t:'tempo',d:'4mi: 1 WU, 1.5mi tempo, 2.5 CD'},
    {t:'long',d:'6mi easy'},
    {t:'rest',d:''}]},
  {wk:7,dates:'4–10 May',vol:'~21mi',rec:false,days:[
    {t:'easy',d:'3.5mi easy'},

  const accentBg    = isIntv ? 'var(--amber-bg)' : 'var(--blue-bg)';
  const accentDim   = isIntv ? '#C8963A' : '#3A7AB8';
 
  const repsHtml = d.reps.map((r, i) => `
    <div style="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="min-width:90px;flex-shrink:0">
        <div style="font-size:11px;font-weight:600;color:${accentColor}">${r.label}</div>

// STORAGE (localStorage fallback)
// ═══════════════════════════════════════════════════════════════
let DB = {};
 
async function dbLoad(key) {
  try {
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : null;
  } catch {
    return JSON.parse(localStorage.getItem('app_'+key) || 'null');
  }
}
async function dbSave(key, val) {
  const s = JSON.stringify(val);
  try { await window.storage.set(key, s); } catch {}
  try { localStorage.setItem('app_'+key, s); } catch {}
}
 
async function initDB() {
  DB.sessions  = await dbLoad('sessions')  || {};
  DB.notes     = await dbLoad('notes')     || {};
  DB.injury    = await dbLoad('injury')    || {};
  DB.diet      = await dbLoad('diet')      || {};
  DB.weights   = await dbLoad('weights')   || [];
  DB.dietNotes = await dbLoad('dietNotes') || {};
  DB.overrides = await dbLoad('overrides') || {};
  DB.shop      = await dbLoad('shop')      || {};
  pruneExpiredOverrides();
}
 
async function saveField(field) { await dbSave(field, DB[field]); }
 
function pruneExpiredOverrides() {
  const dk = dateKey();
  let changed = false;
  Object.keys(DB.overrides).forEach(k => {
    const ov = DB.overrides[k];
    if (!ov.persist && ov.date !== dk) { delete DB.overrides[k]; changed = true; }
  });
  if (changed) saveField('overrides');
}
 
// Returns effective session for a given week+day, applying any override
function effectiveSession(wi, di) {
  const key = `ov_${wi}_${di}`;
  const ov = DB.overrides[key];
  if (ov) return Object.assign({}, WEEKS[wi].days[di], ov.session, { _overridden: true, _ovType: ov.type });
  return WEEKS[wi].days[di];
}

function today() {
  const now = new Date();
  const ms = now - PLAN_START;
  const days = Math.floor(ms / 86400000);
  const wi = Math.min(Math.max(0, Math.floor(days / 7)), 23);
  const jsDay = now.getDay(); // 0=Sun
  const planDay = jsDay === 0 ? 6 : jsDay - 1; // 0=Mon
  const dtr = Math.max(0, Math.round((RACE_DATE - now) / 86400000));
  const pct = Math.min(100, Math.max(0, days / 168 * 100));
  return { wi, planDay, dtr, pct, jsDay, days };
}
 
function sessionPill(t, gym, big) {
  const map = {
    easy: ['pill-easy','Easy run'],
    long: ['pill-long','Long run'],
    tempo:['pill-tempo','Tempo'],
    intv: ['pill-intv','Intervals'],
    race: ['pill-race','Race'],
    gym:  ['pill-gym', gym||'Gym'],
    rest: ['pill-rest','Rest'],
  };
  const [cls, lbl] = map[t]||map.rest;
  return `<span class="pill ${cls}" style="${big?'font-size:13px;padding:5px 12px':''}">${lbl}</span>`;
}
 
function phaseColor(wk) {
  const p = getPhase(wk);
  return p ? p.color : '#44C8A8';
}
function getPhase(wk) {
  return PHASES.find(p => wk >= p.weeks[0] && wk <= p.weeks[1]) || PHASES[0];
}
 
function todayKey(wi, di) { return `w${wi}_d${di}`; }
function dateKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderShoppingList(wi, context) {
  // context = 'week' or 'diet'
  const storageKey = `shop_w${wi}`;
  const checked = DB.shop || {};
 
  let html = `
  <div class="sec-h">Shopping list — Week ${wi + 1}</div>
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <div style="font-size:13px;color:var(--muted);line-height:1.6">Everything you need for this week's food plan. Tick off as you shop. MyProtein whey not included — assumed in stock.</div>
      <button class="btn btn-sm" onclick="clearShopList(${wi})" style="flex-shrink:0;color:var(--faint);border-color:var(--border)">Clear all ticks</button>
    </div>`;
 
  SHOP_CATEGORIES.forEach(cat => {
    const catDone = cat.items.filter(i => checked[`${storageKey}_${i.id}`]).length;
    const catTotal = cat.items.length;
    html += `
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${cat.color}">${cat.label}</div>
        <div style="font-size:11px;color:${catDone === catTotal ? 'var(--green)' : 'var(--faint)'}">${catDone}/${catTotal}</div>
      </div>
      <div style="background:${cat.bg};border-radius:8px;padding:2px 12px">`;
 
    cat.items.forEach(item => {
      const isChecked = checked[`${storageKey}_${item.id}`] || false;
      html += `
        <div class="cb-row${isChecked ? ' done' : ''}" id="shop_${wi}_${item.id}">

  html += `</div>`;
  return html;
}

function togglePlanWeek(i) {
  const body = document.getElementById('pwb_'+i);

  const open = body.classList.toggle('open');
  arr.textContent = open ? '⌄' : '›';
}

  document.getElementById('sec-injury').innerHTML = html;
}
 
function countInjuryToday(dk) {
  return Object.keys(INJURY_GROUPS).reduce((sum,gid) =>

function countTotalInjury() {
  return Object.keys(DB.injury).filter(k => DB.injury[k]).length;

function toggleSession(key) {
  DB.sessions[key] = !DB.sessions[key];
  saveField('sessions');
  renders.today();
}
function toggleSessionByDate(dk, checked) {
  DB.sessions[dk+'_s'] = checked;
  saveField('sessions');
}
function toggleInjury(dk, itemId, gid, checked) {
  DB.injury[`${dk}_${itemId}`] = checked;
  saveField('injury');
  const row = document.getElementById(`cbrow_${dk}_${itemId}`) || document.getElementById(`inj_${dk}_${itemId}`);
  if (row) row.classList.toggle('done', checked);
  const g = INJURY_GROUPS[gid];
  if (!g) return;
  const done = g.items.filter(i => DB.injury[`${dk}_${i.id}`]).length;
  document.querySelectorAll(`[data-count="${gid}"]`).forEach(el => {
    el.textContent = `${done}/${g.items.length}`;
    el.style.color = done === g.items.length ? 'var(--green)' : 'var(--amber)';
  });
}
function resetInjuryGroup(dk, gid) {
  INJURY_GROUPS[gid].items.forEach(i => { DB.injury[`${dk}_${i.id}`] = false; });
  saveField('injury');
  renders.injury();
}

  saveField('weights');
  inp.value = '';

}

    existingDiv.style.display = 'none';

  document.getElementById('om-persist').checked = ov ? ov.persist : false;

    if (i === di) return `<div style="background:var(--border);border-radius:7px;padding:6px 4px;text-align:center;font-size:10px;color:var(--faint)">${d}<br>—</div>`;
    const other = WEEKS[wi].days[i];
    return `<div onclick="selectSwapDay(${i})" id="om-swap-${i}" style="background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px 4px;text-align:center;font-size:10px;color:var(--muted);cursor:pointer">${d}<br><span style="font-size:9px">${other.t}</span></div>`;
  }).join('');
 
  document.getElementById('override-modal').classList.remove('hidden');
}
 
function selectOverrideType(type) {
  _omState.selectedType = type;
  _omState.swapWith = null; // clear swap when picking a type
  document.querySelectorAll('.session-type-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.toLowerCase().replace(' / off','').replace(' run','') === type || b.textContent.toLowerCase() === type);
  });
  document.querySelectorAll('[id^="om-swap-"]').forEach(el => el.style.borderColor = 'var(--border)');
}
 
function selectSwapDay(di) {
  _omState.swapWith = di;
  _omState.selectedType = null;
  document.querySelectorAll('.session-type-btn').forEach(b => b.classList.remove('selected'));
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((_, i) => {
    const el = document.getElementById('om-swap-'+i);
    if (el) el.style.borderColor = i === di ? 'var(--amber)' : 'var(--border)';
  });
  document.getElementById('om-swap-hint').textContent = `Will swap ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][_omState.di]} ↔ ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][di]}`;
}
 
function applyOverride() {
  const { wi, di, selectedType, swapWith } = _omState;
  const persist = document.getElementById('om-persist').checked;
  const dk = dateKey();
 
  if (swapWith !== null) {
    // Swap two days
    const sessA = WEEKS[wi].days[di];
    const sessB = WEEKS[wi].days[swapWith];
    DB.overrides[`ov_${wi}_${di}`]       = { session: { t: sessB.t, d: sessB.d, gym: sessB.gym }, type: 'swap', persist, date: dk };
    DB.overrides[`ov_${wi}_${swapWith}`] = { session: { t: sessA.t, d: sessA.d, gym: sessA.gym }, type: 'swap', persist, date: dk };
  } else if (selectedType) {
    if (selectedType === 'skipped' || selectedType === 'deferred') {
      DB.overrides[`ov_${wi}_${di}`] = { session: { t: 'rest', d: '' }, type: selectedType, persist, date: dk };
    } else {
      DB.overrides[`ov_${wi}_${di}`] = { session: { t: selectedType, d: '' }, type: 'changed', persist, date: dk };
    }
  } else {
    closeOverrideModal();
    return;
  }
 
  saveField('overrides');
  closeOverrideModal();
  if (_omState.source === 'today') renders.today();
  else renders.week();
}
 
function clearOverride() {
  const { wi, di } = _omState;
  delete DB.overrides[`ov_${wi}_${di}`];
  saveField('overrides');
  closeOverrideModal();
  renders[_omState.source === 'today' ? 'today' : 'week']();
}
 
function closeOverrideModal(e) {
  if (e && e.target !== document.getElementById('override-modal')) return;
  document.getElementById('override-modal').classList.add('hidden');
}
 
// ═══════════════════════════════════════════════════════════════
// RENDER MAP
// ═══════════════════════════════════════════════════════════════
const renders = {
  today:    renderToday,
  week:     renderWeek,
  plan:     renderPlan,
  diet:     renderDiet,
  injury:   renderInjury,
  progress: renderProgress,
};
 
// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initDB().then(() => {
  renders.today();
});
</script>
